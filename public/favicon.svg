<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#1a0e0a"/>
  
  <!-- Coffee cup body -->
  <path d="M10 18 h22 l-2 18 c-.3 2.5-2.5 4-5 4 H17 c-2.5 0-4.7-1.5-5-4 L10 18z" fill="#c8956c"/>
  
  <!-- Cup highlight -->
  <path d="M12 18 h18 l-1.5 15 c-.2 2-2 3.2-4 3.2 H17.5 c-2 0-3.8-1.2-4-3.2 L12 18z" fill="#d4a574"/>
  
  <!-- Cup inner shadow/coffee -->
  <path d="M13 20 h16 l-1.2 12.5 c-.2 1.6-1.6 2.5-3.2 2.5 h-7.2 c-1.6 0-3-0.9-3.2-2.5 L13 20z" fill="#3d1e0c"/>
  
  <!-- Coffee surface -->
  <ellipse cx="21" cy="20" rx="8" ry="2" fill="#5c2e14"/>
  <ellipse cx="21" cy="20" rx="8" ry="1.8" fill="#6b3a1f"/>
  
  <!-- Cup handle -->
  <path d="M32 22 c4-0.5 7 1.5 7 5 s-3 5.5-7 5" stroke="#c8956c" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M32 23 c3.2-0.3 5.5 1.2 5.5 4 s-2.3 4.3-5.5 4" stroke="#d4a574" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Steam lines -->
  <path d="M16 14 c0-2 2-3 2-5" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <animate attributeName="d" values="M16 14 c0-2 2-3 2-5;M16 13 c1-2 -1-3 0-5;M16 14 c0-2 2-3 2-5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M21 13 c0-2 2-3 2-5" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <animate attributeName="d" values="M21 13 c0-2 2-3 2-5;M21 12 c-1-2 1-3 0-5;M21 13 c0-2 2-3 2-5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M26 14 c0-2 2-3 2-5" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <animate attributeName="d" values="M26 14 c0-2 2-3 2-5;M26 13 c1-2 -1-3 0-5;M26 14 c0-2 2-3 2-5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Saucer / plate -->
  <ellipse cx="21" cy="40" rx="12" ry="2.5" fill="#a0724e"/>
  <ellipse cx="21" cy="40" rx="10" ry="2" fill="#c8956c"/>
  
  <!-- Coffee bean decoration (small) -->
  <g transform="translate(35, 12) rotate(30)">
    <ellipse rx="2.5" ry="3.5" fill="#5c2e14"/>
    <path d="M0 -3.5 c-1 2.3 1 4.7 0 7" stroke="#3d1e0c" stroke-width="0.7" fill="none"/>
  </g>
</svg>